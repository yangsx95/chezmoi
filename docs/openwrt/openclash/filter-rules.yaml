    # ===============================
  # 5.4 随机无规则域名拦截
  # ===============================

  # 1. 任意一段包含连续 5 位以上数字
  # 例：930677f28.rtrtrtw.cn、lb1590240fk.imapooo.com
  - DOMAIN-REGEX,(^|\.)[a-z0-9-]*[0-9]{5}[0-9]*[a-z0-9-]*(\.|$),REJECT
  # 2. 任意一段是 8 位以上十六进制/机器码风格
  # 例：930677f28、a83f91c2、7f9a2b01
  - DOMAIN-REGEX,(^|\.)[0-9a-f]{8}[0-9a-f]*(\.|$),REJECT
  # 3. 任意一段是 7 位以上无元音随机串
  # 例：rtrtrtw、qwrtyps、xkcdmnp
  - DOMAIN-REGEX,(^|\.)[bcdfghjklmnpqrstvwxyz0-9]{7}[bcdfghjklmnpqrstvwxyz0-9]*(\.|$),REJECT
  # 4. 任意一段是“字母 + 长数字 + 字母”的灰产格式
  # 例：lb1590240fk、ab123456cd
  - DOMAIN-REGEX,(^|\.)[a-z]{1}[a-z]*[0-9]{4}[0-9]*[a-z]{1}[a-z]*(\.|$),REJECT
  # 5. 任意一段长度超过 20，且只由小写字母/数字/横线组成
  # 例：asdhqweuiqweoiuqweoiu.example.com
  - DOMAIN-REGEX,(^|\.)[a-z0-9-]{20}[a-z0-9-]*(\.|$),REJECT
  
